<!DOCTYPE html>

<html lang="fr" style="background:#0a0a0a">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-title" content="Routine">
<title>Routine</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
–bg: #0a0a0a;
–surface: #111111;
–border: #1e1e1e;
–text: #f0f0f0;
–muted: #555;
–dim: #333;
–green: #7ec850;
–yellow: #e8c547;
–teal: #4fc3a1;
}

body {
color-scheme: dark;
background: var(–bg);
color: var(–text);
font-family: -apple-system, ‘SF Pro Display’, ‘Helvetica Neue’, sans-serif;
min-height: 100vh;
padding-bottom: env(safe-area-inset-bottom, 20px);
overscroll-behavior: none;
}

.header {
padding: 52px 20px 0;
max-width: 480px;
margin: 0 auto;
}

.eyebrow {
font-size: 10px;
letter-spacing: 3px;
color: var(–muted);
text-transform: uppercase;
margin-bottom: 6px;
}

.title {
font-size: 24px;
font-weight: 800;
letter-spacing: -0.5px;
margin-bottom: 4px;
}

.date-label {
font-size: 13px;
color: #555;
margin-bottom: 24px;
text-transform: capitalize;
}

.tabs {
display: flex;
gap: 8px;
margin-bottom: 28px;
}

.tab {
flex: 1;
padding: 11px 0;
border-radius: 10px;
border: none;
cursor: pointer;
font-size: 13px;
font-weight: 600;
transition: all 0.15s;
-webkit-appearance: none;
}

.tab.active { background: var(–text); color: var(–bg); }
.tab.inactive { background: #1a1a1a; color: #555; }

.content {
max-width: 480px;
margin: 0 auto;
padding: 0 20px 40px;
}

/* Template selector */
.tpl-selector {
display: flex;
gap: 8px;
margin-bottom: 28px;
}

.tpl-btn {
flex: 1;
padding: 11px 6px;
border-radius: 10px;
cursor: pointer;
font-size: 10px;
font-weight: 700;
letter-spacing: 1px;
text-transform: uppercase;
transition: all 0.15s;
-webkit-appearance: none;
}

/* Timeline */
.timeline { position: relative; }

.tl-row {
display: flex;
gap: 16px;
margin-bottom: 20px;
align-items: flex-start;
}

.tl-line {
display: flex;
flex-direction: column;
align-items: center;
width: 20px;
flex-shrink: 0;
padding-top: 4px;
}

.tl-dot {
width: 10px;
height: 10px;
border-radius: 50%;
flex-shrink: 0;
}

.tl-connector {
width: 1px;
flex: 1;
min-height: 28px;
background: #1e1e1e;
margin-top: 4px;
}

.tl-content { flex: 1; padding-bottom: 4px; }

.tl-time {
font-size: 11px;
font-weight: 600;
letter-spacing: 0.5px;
margin-bottom: 2px;
}

.tl-title {
font-size: 15px;
font-weight: 600;
margin-bottom: 2px;
}

.tl-detail {
font-size: 13px;
color: #888;
line-height: 1.5;
}

/* Tracker */
.card {
background: var(–surface);
border-radius: 16px;
padding: 20px;
margin-bottom: 16px;
border: 1px solid var(–border);
}

.card-eyebrow {
font-size: 10px;
letter-spacing: 2px;
color: var(–muted);
text-transform: uppercase;
margin-bottom: 12px;
}

.score-row {
display: flex;
align-items: baseline;
gap: 6px;
margin-bottom: 16px;
}

.score-big {
font-size: 44px;
font-weight: 800;
line-height: 1;
transition: color 0.3s;
}

.score-sep { font-size: 20px; color: #333; }
.score-total { font-size: 20px; color: #444; }

.check-row {
display: flex;
align-items: center;
gap: 12px;
padding: 13px 0;
cursor: pointer;
user-select: none;
}

.check-row + .check-row { border-top: 1px solid #1a1a1a; }

.checkbox {
width: 24px;
height: 24px;
border-radius: 7px;
border: 2px solid #2a2a2a;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
transition: all 0.15s;
font-size: 13px;
font-weight: 800;
color: var(–bg);
}

.checkbox.checked {
background: var(–green);
border-color: var(–green);
}

.check-label {
font-size: 14px;
line-height: 1.4;
transition: color 0.15s;
}

/* Week grid */
.week-grid {
display: flex;
gap: 6px;
margin-top: 4px;
}

.day-col { flex: 1; text-align: center; }

.day-letter {
font-size: 10px;
color: #444;
margin-bottom: 6px;
text-transform: uppercase;
}

.day-box {
height: 38px;
border-radius: 7px;
display: flex;
align-items: center;
justify-content: center;
font-size: 12px;
font-weight: 700;
transition: background 0.2s;
}

.legend {
display: flex;
gap: 12px;
margin-top: 14px;
flex-wrap: wrap;
}

.legend-item {
display: flex;
align-items: center;
gap: 5px;
font-size: 11px;
color: #555;
}

.legend-dot {
width: 10px;
height: 10px;
border-radius: 3px;
}
</style>

</head>
<body>

<div class="header">
  <div class="eyebrow">Ta journée type</div>
  <div class="title">Discipline & Régularité</div>
  <div class="date-label" id="dateLabel"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('routine')" id="tab-routine">Routine</button>
    <button class="tab inactive" onclick="switchTab('tracker')" id="tab-tracker">Tracker</button>
  </div>
</div>

<div class="content">

  <!-- ROUTINE TAB -->

  <div id="view-routine">
    <div class="tpl-selector">
      <button class="tpl-btn" id="tpl-A" onclick="setTemplate('A')">Shift matin</button>

      <button class="tpl-btn" id="tpl-C" onclick="setTemplate('C')">Jour off</button>
    </div>
    <div class="timeline" id="timeline"></div>

  <!-- TRACKER TAB -->

  <div id="view-tracker" style="display:none">
    <div class="card">

      <div class="score-row">
        <span class="score-big" id="scoreNum">0</span>
        <span class="score-sep">/</span>
        <span class="score-total">3</span>
        <span id="fireEmoji" style="font-size:20px;display:none">🔥</span>
      </div>
      <div id="checks"></div>
    </div>

<script>
const TEMPLATES = {
  A: {
    accent: "#e8c547",
    bgColor: "#1a1a00",
    blocks: [
      { time: "0h00", title: "🌙 Réveil", detail: "Eau + Berocca + s'habiller. Zéro écran." },
      { time: "1h00", title: "🚗 Départ", detail: "2h de trajet." },
      { time: "3h00", title: "💼 Prise de service", detail: "" },
      { time: "11h+", title: "🚗 Fin de shift + départ", detail: "2h de trajet retour." },
      { time: "13h+", title: "🍽️ Retour maison", detail: "Premier repas — ouverture IF. Dense, protéiné." },
      { time: "13h30", title: "😮‍💨 Récupération", detail: "30 min allongé, yeux fermés. Non négociable." },
      { time: "Après-midi", title: "💪 Sport", detail: "Shift léger → séance normale. Shift lourd → marche ou mobilité. Jamais zéro." },
      { time: "Avant 21h", title: "🌿 Dernier repas", detail: "Fermeture IF. Granions Magnésium." },
      { time: "Dès que possible", title: "🛏️ Coucher", detail: "Objectif 7–8h. Coucher 22h → réveil 6h." },
    ]
  },
  B: {
    accent: "#4fc3a1",
    bgColor: "#001a15",
    blocks: [
      { time: "3h avant départ", title: "🌙 Réveil", detail: "1h de routine + 2h de trajet à anticiper." },
      { time: "Routine 1h", title: "📋 Préparation", detail: "Eau + Berocca + mobilité 10 min + intention du jour + tracker finances." },
      { time: "30 min avant départ", title: "🍽️ Premier repas", detail: "Ouverture IF. Dernier moment avant de partir." },
      { time: "2h avant service", title: "🚗 Départ", detail: "2h de trajet." },
      { time: "Prise de service", title: "💼 Travail", detail: "" },
      { time: "3h–5h du mat", title: "🚗 Retour maison", detail: "1h–3h fin de shift + 2h trajet." },
      { time: "Arrivée", title: "🛏️ Coucher immédiat", detail: "Objectif 7–8h → réveil entre 10h et 13h." },
      { time: "Au réveil", title: "💪 Sport", detail: "Premier repas à l'ouverture IF. Sport dans l'après-midi si possible." },
    ]
  },
  C: {
    accent: "#7ec850",
    bgColor: "#001a00",
    blocks: [
      { time: "7h00", title: "☀️ Lever fixe", detail: "L'ancre de ta semaine. Même heure tous les jours off." },
      { time: "7h–8h", title: "📋 Routine matin", detail: "Eau + Berocca + mobilité 10 min + intention du jour + tracker finances 5 min." },
      { time: "8h00", title: "🍽️ Premier repas", detail: "Ouverture IF." },
      { time: "Matin", title: "🎯 Une tâche prioritaire", detail: "Finances, projet, démarche. Une seule. Pas trois." },
      { time: "Après-midi", title: "💪 Sport", detail: "Séance principale. SaltStick autour." },
      { time: "Avant 18h", title: "🌿 Dernier repas", detail: "Fermeture IF." },
      { time: "Soir", title: "😮‍💨 Décompression", detail: "Granions Magnésium. Pas de décisions importantes." },
      { time: "21h00", title: "🛏️ Coucher", detail: "Non négociable." },
    ]
  }
};

const CHECKS = [
  { key: "sleep", label: "Sommeil 7–8h atteint" },
  { key: "sport", label: "Sport fait (même 20 min)" },
  { key: "if", label: "IF respecté + finances touchées" },
];

const DAY_LETTERS = ["D","L","M","M","J","V","S"];

let currentTemplate = "C";
let tracker = {};

function getTodayKey() {
  return new Date().toISOString().slice(0,10);
}

function loadTracker() {
  try { tracker = JSON.parse(localStorage.getItem("routine_tracker") || "{}"); } catch(e) { tracker = {}; }
}

function saveTracker() {
  localStorage.setItem("routine_tracker", JSON.stringify(tracker));
}

function setDate() {
  const d = new Date();
  document.getElementById("dateLabel").textContent = d.toLocaleDateString("fr-FR", { weekday:"long", day:"numeric", month:"long" });
}

function switchTab(tab) {
  document.getElementById("view-routine").style.display = tab === "routine" ? "block" : "none";
  document.getElementById("view-tracker").style.display = tab === "tracker" ? "block" : "none";
  document.getElementById("tab-routine").className = "tab " + (tab === "routine" ? "active" : "inactive");
  document.getElementById("tab-tracker").className = "tab " + (tab === "tracker" ? "active" : "inactive");
  if (tab === "tracker") renderTracker();
}

function setTemplate(key) {
  currentTemplate = key;
  ["A","B","C"].forEach(k => {
    const btn = document.getElementById("tpl-" + k);
    const tpl = TEMPLATES[k];
    if (k === key) {
      btn.style.background = tpl.bgColor;
      btn.style.color = tpl.accent;
      btn.style.border = "2px solid " + tpl.accent;
    } else {
      btn.style.background = "#111";
      btn.style.color = "#444";
      btn.style.border = "2px solid #1e1e1e";
    }
  });
  renderTimeline();
}

function renderTimeline() {
  const tpl = TEMPLATES[currentTemplate];
  const container = document.getElementById("timeline");
  container.innerHTML = "";
  tpl.blocks.forEach((block, i) => {
    const isLast = i === tpl.blocks.length - 1;
    const row = document.createElement("div");
    row.className = "tl-row";
    row.innerHTML = `
      <div class="tl-line">
        <div class="tl-dot" style="background:${tpl.accent}"></div>
        ${!isLast ? '<div class="tl-connector"></div>' : ""}
      </div>
      <div class="tl-content">
        <div class="tl-time" style="color:${tpl.accent}">${block.time}</div>
        <div class="tl-title">${block.title}</div>
        ${block.detail ? `<div class="tl-detail">${block.detail}</div>` : ""}
      </div>
    `;
    container.appendChild(row);
  });
}

function renderTracker() {
  const todayKey = getTodayKey();
  const todayData = tracker[todayKey] || {};
  const count = CHECKS.filter(c => todayData[c.key]).length;

  const scoreEl = document.getElementById("scoreNum");
  scoreEl.textContent = count;
  scoreEl.style.color = count === 3 ? "#7ec850" : "#f0f0f0";
  document.getElementById("fireEmoji").style.display = count === 3 ? "inline" : "none";

  const checksEl = document.getElementById("checks");
  checksEl.innerHTML = "";
  CHECKS.forEach(c => {
    const checked = !!todayData[c.key];
    const row = document.createElement("div");
    row.className = "check-row";
    row.innerHTML = `
      <div class="checkbox ${checked ? "checked" : ""}">${checked ? "✓" : ""}</div>
      <div class="check-label" style="color:${checked ? "#f0f0f0" : "#666"}">${c.label}</div>
    `;
    row.onclick = () => {
      if (!tracker[todayKey]) tracker[todayKey] = {};
      tracker[todayKey][c.key] = !tracker[todayKey][c.key];
      saveTracker();
      renderTracker();
    };
    checksEl.appendChild(row);
  });

  renderWeek();
}

function renderWeek() {
  const todayKey = getTodayKey();
  const grid = document.getElementById("weekGrid");
  grid.innerHTML = "";
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    days.push(d);
  }
  const bgColors = ["#1a1a1a","#2a3a1a","#3a5a1a","#7ec850"];
  const textColors = ["#444","#5a8a2a","#7ec850","#0a0a0a"];

  days.forEach(d => {
    const key = d.toISOString().slice(0,10);
    const data = tracker[key] || {};
    const count = CHECKS.filter(c => data[c.key]).length;
    const isToday = key === todayKey;
    const col = document.createElement("div");
    col.className = "day-col";
    col.innerHTML = `
      <div class="day-letter">${DAY_LETTERS[d.getDay()]}</div>
      <div class="day-box" style="background:${bgColors[count]};color:${textColors[count]};border:2px solid ${isToday ? "#7ec850" : "transparent"}">
        ${count > 0 ? count : ""}
      </div>
    `;
    grid.appendChild(col);
  });
}

// Init
loadTracker();
setDate();
setTemplate("C");
</script>

</body>
